spring:
  application:
    name: flight-booking
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flightdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

aviastack:
  api-key: ${AVIASTACK_API_KEY:7cf311da66e8759634f3d799d362e4da}
  base-url: https://api.aviastack.com/v1
