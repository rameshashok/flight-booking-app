<div class="search-container">
  <mat-card class="search-card">
    <mat-card-header>
      <mat-card-title>Find Your Flight</mat-card-title>
      <mat-card-subtitle>Enter IATA airport codes (e.g. JFK, LAX, LHR)</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="search()" class="search-form">
        <mat-form-field appearance="outline">
          <mat-label>From (IATA)</mat-label>
          <input matInput formControlName="depIata" placeholder="e.g. JFK" maxlength="3" style="text-transform:uppercase" />
          <mat-hint>3-letter airport code</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>To (IATA)</mat-label>
          <input matInput formControlName="arrIata" placeholder="e.g. LAX" maxlength="3" style="text-transform:uppercase" />
          <mat-hint>3-letter airport code</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="date" />
          <mat-datepicker-toggle matIconSuffix [for]="picker" />
          <mat-datepicker #picker />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Search Flights
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
